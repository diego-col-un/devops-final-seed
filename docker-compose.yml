version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_PATH=tasks.db
    volumes:
      - todo_data:/app
    networks:
      - frontend-api
      - monitoring-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-network
    depends_on:
      - web

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - monitoring-network
    depends_on:
      - prometheus

# --- SECCIÓN DE ALMACENAMIENTO ---
volumes:
  todo_data:

# --- SECCIÓN DE REDES EXPLÍCITAS ---
networks:
  frontend-api:
    driver: bridge
  monitoring-network:
    driver: bridge