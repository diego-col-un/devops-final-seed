name: CI/CD Pipeline To-Do API

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Analizar código con Linter (Flake8)
      run: |
        # Detiene la ejecución si hay errores de sintaxis de Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias estilo de código (no rompe el pipeline)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Ejecutar Tests Unitarios (Pytest)
      run: |
        pytest -v

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: actions/setup-docker-action@v4
      with:
        daemon_off: false

    - name: Validar compilación de la Imagen Docker
      run: |
        docker build -t devops-final-seed-web:latest .
        docker images