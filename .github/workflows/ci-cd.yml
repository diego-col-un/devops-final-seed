name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pip-audit

    - name: Analizar código con Linter (Flake8)
      run: |
        flake8 . \
        --exclude=venv,__pycache__\
        --max-line-length=127 \
        --ignore=E302,E305,W292

    - name: Ejecutar Tests Unitarios (Pytest)
      run: |
        python -m pytest -v

    - name: Auditoria de seguridad
      run: |
        pip-audit

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      run: |
        docker build -t devops-final-seed:${{ github.sha }} .

    - name: Validar docker-compose
      run: |
        docker compose config

    - name: Verificar imágenes Docker
      run: |
        docker images